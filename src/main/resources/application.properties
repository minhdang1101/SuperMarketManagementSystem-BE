spring.application.name=SuperMarketManagementSystem
server.port=8080
spring.data.jpa.repositories.enabled=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=supermarket;encrypt=false
spring.datasource.username=sa
spring.datasource.password=your_local_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=your_local_jwt_secret
vnpay.tmn-code=your_local_vnpay_code
vnpay.hash-secret=your_local_vnpay_secret

file.upload-dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB

spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
