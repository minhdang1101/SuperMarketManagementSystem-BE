spring.application.name=SuperMarketManagementSystem
spring.config.import=optional:file:.env[.properties]

server.port=8080

# OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.persist-authorization=true

spring.data.jpa.repositories.enabled=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=SMMS;encrypt=false}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:sa}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET:quoctest}
jwt.expiration=86400000
jwt.access-expiration=900000
jwt.refresh-expiration=604800000

file.upload-dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url=${VNPAY_RETURN_URL:http://127.0.0.1:5173/payment/vnpay-return}
vnpay.api-url=${VNPAY_API_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}
vnpay.version=${VNPAY_VERSION:2.1.0}
vnpay.command=${VNPAY_COMMAND:pay}
vnpay.order-type=${VNPAY_ORDER_TYPE:other}

ai.provider=${AI_PROVIDER:gemini}
ai.api-url=${AI_API_URL:https://generativelanguage.googleapis.com/v1beta}
ai.api-key=${AI_API_KEY:}
ai.model=${AI_MODEL:gemini-2.5-flash}
ai.timeout-seconds=${AI_TIMEOUT_SECONDS:30}
